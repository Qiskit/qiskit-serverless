[pytest]
# Apply @pytest.mark.timeout only to the test call phase, NOT fixture setup, so
# the session-scoped warm_pipeline fixture's own generous cold-start budget
# (wait_for_terminal timeout=300s) is not silently capped by the class-level
# @pytest.mark.timeout(180) — which would otherwise kill the first test
# mid-warm-up, the exact cold-start flake warm_pipeline exists to prevent.
timeout_func_only = true
markers =
    fleets: Fleet mock + MinIO integration tests
    timeout: pytest-timeout marker
