---
features:
  - |
    Added comprehensive error tracking and event management capabilities for Qiskit Functions.
    This feature enables function developers to send custom error events via :func:`.send_error`
    or raise structured exceptions via :class:`.ServerlessError`, and allows users to retrieve
    and inspect these events for debugging and monitoring purposes.
    
    **Function development**
    
    Function developers can now use two new capabilities:
    
    - A new :func:`.send_error` function to register custom error events
      that will be stored in the gateway and associated with the job. This is particularly
      useful for tracking application-specific errors, validation failures, or custom
      error conditions. Each event is represented by a :class:`.JobEvent` object.

      It can be used like this:

      .. code-block:: python
      
        from qiskit_serverless import send_error

        # Send a simple error
        send_error(
            code="ERR001",
            message="Invalid input parameter",
            exception="ValueError"
        )

        # Send an error with additional context
        send_error(
            code="ERR002",
            message="Circuit optimization failed",
            exception="OptimizationError",
            args={
                "circuit_depth": 150,
                "num_qubits": 127,
                "optimization_level": 3
            }
        )
    
    - A new :class:`.ServerlessError` exception class to raise structured, trackable errors.
      When a :class:`.ServerlessError` is raised in a function, it is automatically caught by the framework,
      logged as an ERROR event, and can be retrieved by users through the events API.

      The :class:`.ServerlessError` class provides a structured way to communicate errors with:
      
      - ``code``: A unique error code for categorization
      - ``message``: Human-readable error description
      - ``details``: Additional context (can be any JSON-serializable data)

      Example usage:
      
      .. code-block:: python

        from qiskit_serverless import ServerlessError

        # Raise a structured error
        raise ServerlessError(
            code="VAL001",
            message="Invalid circuit depth",
            details={"max_depth": 100, "provided_depth": 150}
        )

    **Designing custom error classes**

    Function developers can subclass :class:`.ServerlessError` to build
    domain-specific exception hierarchies. The framework records the name as
    the ``exception`` field in the event, so subclass names appear directly in the events
    retrieved by users, making errors easier to categorize and filter.

    The simplest form requires no ``__init__`` override:

    .. code-block:: python

      from qiskit_serverless import ServerlessError

      class ProviderError(ServerlessError):
          """Base error for all errors raised by this provider."""

      class ValidationError(ProviderError):
          """Raised when input arguments fail validation."""

      class ResourceError(ProviderError):
          """Raised when a required resource is unavailable."""

    Raise them exactly as you would :class:`.ServerlessError`:

    .. code-block:: python

      raise ValidationError(
          code="VAL001",
          message="num_qubits exceeds the maximum allowed value",
          details={"max": 127, "provided": 256}
      )

    On the client side, the ``exception`` field of the retrieved event will be
    ``"ValidationError"`` rather than ``"ServerlessError"``, which lets users filter
    precisely:

    .. code-block:: python

      error_events = job.events(type="ERROR")
      for event in error_events:
          if event.data.get("exception") == "ValidationError":
              print("Input problem:", event.data["message"])

    You can also override ``__init__`` to fix a ``code`` prefix or add mandatory fields,
    so callers only need to provide the varying parts:

    .. code-block:: python

      class CircuitError(ProviderError):
          """Raised for circuit-related failures."""

          def __init__(self, message: str, circuit_id: str):
              super().__init__(
                  code="CIR001",
                  message=message,
                  details={"circuit_id": circuit_id},
              )

      raise CircuitError("Circuit depth exceeds limit", circuit_id="circ-42")

    **When to use ServerlessError vs send_error**

    - Use :class:`.ServerlessError` when you want to **stop execution** and signal a fatal error
      that prevents the function from completing successfully. The error will be automatically
      logged, the job will transition to ERROR status, and the structured error message will be
      raised as a :class:`.QiskitServerlessException` when the user calls ``job.result()``:

      .. code-block:: text

        QiskitServerlessException:
        | Message: num_qubits exceeds the maximum allowed value
        | Code: VAL001
        | Exception: ValidationError
        | Details:
        |   - max: 127
        |   - provided: 256

    - Use :func:`.send_error` when you want to **log an error but continue execution**. This is
      useful for non-fatal errors, warnings, or when you want to track multiple issues without
      stopping the function. Events sent this way are still surfaced in ``job.result()`` if the
      job ultimately ends in ERROR status.

    Example combining both approaches:

    .. code-block:: python

      from qiskit_serverless import ServerlessError, send_error

      def process_circuits(circuits):
          failed = 0
          for circuit in circuits:
              if circuit.num_qubits > 127:
                  # Log non-fatal error, continue processing
                  send_error(
                      code="SKIP001",
                      message="Circuit exceeds qubit limit",
                      exception="ValidationError",
                      args={"num_qubits": circuit.num_qubits}
                  )
                  failed += 1
                  continue
              process(circuit)
          
          # Raise fatal error if all circuits failed
          if failed == len(circuits):
              raise ServerlessError(
                  code="FATAL001",
                  message="All circuits failed",
                  details={"total": len(circuits)}
              )
    
    **Client side**
    
    Users can retrieve job events using the new :func:`events` method available on both
    class:`.Job` objects and class:`.ServerlessClient` instances. Events can be filtered by type or
    retrieved in bulk for comprehensive debugging. Each event is represented by a
    :class:`.JobEvent` object with the following attributes:

    - ``event_type``: Type of event (e.g., "ERROR", "STATUS_CHANGE")
    - ``origin``: Where the event originated (e.g., "API", "SCHEDULER", "FUNCTION")
    - ``context``: Context in which event was raised (e.g., "SEND_ERROR", "SET_SUB_STATUS")
    - ``created``: ISO 8601 timestamp of event creation
    - ``data``: Dictionary containing event-specific data (for ERROR events: code, message, exception, args)

    Retrieve all events for a job:

    .. code-block:: python

      from qiskit_serverless import ServerlessClient

      serverless = ServerlessClient(...)
      job = serverless.run("my-function", arguments={"param": "value"})
      
      # Get all events
      all_events = job.events()
      for event in all_events:
          print(f"Type: {event.event_type}")
          print(f"Created: {event.created}")
          print(f"Data: {event.data}")

    To retrieve error events, users can filter events by type:

    .. code-block:: python

      # Get only error events
      error_events = job.events(type="ERROR")
      
      for error in error_events:
          print(f"Error Code: {error.data.get('code')}")
          print(f"Message: {error.data.get('message')}")
          print(f"Exception: {error.data.get('exception')}")
          if 'args' in error.data:
              print(f"Additional Info: {error.data['args']}")
              
    On top of the :class:`.Job` methods, users can retrieve events using the client directly:

    .. code-block:: python

      # Alternative: use client to get events by job_id
      events = serverless.events(job_id="my-job-id", type="ERROR")
      
    **API**
    
    Two new REST API endpoints have been added:
    
    - ``GET /api/v1/jobs/{job_id}/events/``: Retrieve job events 
    - ``POST /api/v1/jobs/{job_id}/event/``: Create a new job event
