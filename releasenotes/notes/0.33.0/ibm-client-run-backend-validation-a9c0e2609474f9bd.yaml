---
features:
  - |
    :class:`.IBMServerlessClient` now exposes several methods that wrap the Qiskit IBM Runtime
    ``QiskitRuntimeService`` API to interact with IBM Quantum backends:

    * :meth:`.IBMServerlessClient.backends` — Lists IBM Quantum backends accessible through the configured instance.
      Results are cached per client instance, making repeated calls within a session inexpensive.
      Use ``refresh_cache=True`` to force a refresh. Wraps ``QiskitRuntimeService.backends()``.
    * :meth:`.IBMServerlessClient.backend` — Fetches a single backend
      by name and updates the cache. More efficient than listing all backends and validates access.
      Wraps ``QiskitRuntimeService.backend()``.
    * :meth:`.IBMServerlessClient.least_busy` — Returns the
      backend with the fewest pending jobs that matches the specified criteria. This updates the cache
      with the retrieved backend. Wraps ``QiskitRuntimeService.least_busy()``.
    * :meth:`.IBMServerlessClient.usage` — Returns runtime usage information for the active instance, including
      ``usage_remaining_seconds`` and ``usage_limit_reached``. Wraps ``QiskitRuntimeService.usage()``.

    All methods include comprehensive error handling and raise :class:`.QiskitServerlessException` with
    clear error messages when operations fail.
  - |
    :meth:`.IBMServerlessClient.run` performs three pre-flight checks before submitting a job to the
    gateway, providing early and clear error messages instead of silent queue waits:

    * **Usage quota** — raises :class:`.QiskitServerlessException` when the instance has no remaining
      runtime quota (within ``USAGE_ZERO_EPSILON_SECONDS``); emits a ``UserWarning`` when quota is
      low (below ``USAGE_LOW_THRESHOLD_SECONDS``). Transient failures of the usage endpoint produce
      a warning rather than blocking the run. The low quota warning can be suppressed by passing
      ``suppress_low_usage_warning=True`` to the :meth:`.IBMServerlessClient.run` method.
    * **Backend access** — when ``arguments["backend_name"]`` is set, validates access via a
      single-backend lookup. Raises :class:`.QiskitServerlessException` if the backend is not found or
      is inaccessible.
    * **Instance has backends** — when no ``backend_name`` is given, verifies the instance exposes
      at least one backend (result cached). Raises :class:`.QiskitServerlessException` if none are found.
upgrade:
  - |
    Two environment variables control the usage quota thresholds used by
    :meth:`.IBMServerlessClient.run`. Their defaults are provisional and may be adjusted in a future
    release:

    * ``USAGE_LOW_THRESHOLD_SECONDS`` (default ``600`` s) — warn when remaining quota falls below
      this value.
    * ``USAGE_ZERO_EPSILON_SECONDS`` (default ``1`` s) — treat remaining quota at or below this
      as zero and raise an error.
  - |
    Improved docstrings for :class:`.IBMServerlessClient` methods (:meth:`~.IBMServerlessClient.usage`,
    :meth:`~.IBMServerlessClient.backends`, :meth:`~.IBMServerlessClient.backend`,
    :meth:`~.IBMServerlessClient.least_busy`, and ``_check_usage``) to provide clearer descriptions and better examples.
    All methods now use named parameters when calling the underlying Qiskit IBM Runtime
    ``QiskitRuntimeService`` methods for improved code clarity and maintainability.
