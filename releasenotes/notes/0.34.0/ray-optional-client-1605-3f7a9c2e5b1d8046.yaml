---
upgrade:
  - |
    ``ray`` was removed from the base client requirements and is now provided by the
    ``ray`` extra (``pip install qiskit-serverless[ray]``). If you rely on the Ray
    runner or on the Ray-only helpers (``distribute_task``, ``get``, ``put``,
    ``get_refs_by_status``, ``remote``), install the extra. Using any of those symbols
    without Ray installed now raises a clear ``ModuleNotFoundError`` instructing you to
    ``pip install qiskit-serverless[ray]``. The published Ray node image installs the
    ``[ray]`` extra, so its behavior is unchanged.
