---
prelude: >
    Major refactor in logs to differentiate between provider logs
    and user logs and optimize storage. The logs are now stored in COS while keeping backward
    compatibility.

features:
  - |
    The ``qiskit-serverless`` Python library added two new utilities, :func:`get_logger()`
    and :func:`get_provider_logger()`, available to Qiskit Function developers.
    Developers should use these functions within their source code to distinguish which
    logging information is relevant for users (:func:`get_logger()`) or providers
    (:func:`get_provider_logger()`) respectively.
    These functions create ``[PUBLIC]`` and ``[PRIVATE]`` prefixes under the hood to
    allow the service to filter the information appropriately.
    To keep intellectual property safe, only function users can access user logs,
    and only providers can access provider logs.
    For example::

      from qiskit_serverless import get_logger, get_provider_logger

      user_logger = get_logger()
      provider_logger = get_provider_logger()

      get_logger().info("User log")
      user_logger.info("User multiline\nlog")
      user_logger.warning("User log")
      user_logger.error("User log")

      get_provider_logger().info("Provider log")
      provider_logger.info("Provider multiline\nlog")
      provider_logger.warning("Provider log")
      provider_logger.error("Provider log")

  - |
    The :class:`ServerlessClient` and :class:`Job` classes' :meth:`logs` method will
    from now on only return user logs. To access provider logs, we have added a new
    :meth:`provider_logs` method.
    For example::

        runnable_function = serverless_client.function("my_function")
        job = runnable_function.run()

        print(job.logs())  # only users
        print(job.provider_logs())  # only providers

  - |
    The Scheduler is modified to upload logs to COS when a job transitions from running to
    a terminal state. At that moment, the logs will be filtered based on the prefixes,
    and the information will be saved in the corresponding folder inside COS.

  - |
    The Gateway endpoint ``/logs`` has been modified to only target user logs,
    and a new `/provider_logs`` has been added for provider logs.
    Both should return:
    1. The COS log for finished jobs, if it exists. This was previously filtered in the Scheduler.
    2. The Ray console logs if the job is running. This is filtered live.
    3. As a fallback, logs from the database.

upgrade:
  - |
    Added several quality of life improvements in testing.

