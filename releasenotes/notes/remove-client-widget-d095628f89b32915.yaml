---
upgrade:
  - |
    The  deprecated ``widget()`` method has been removed from ``BaseClient``, 
    ``ServerlessClient``, and ``IBMServerlessClient``. The visualization 
    module (deprecated in 0.33.0) has been completely removed from the package.
    
    If you were using ``client.widget()``, this functionality is no longer 
    available. Please use alternative methods to inspect client and job 
    information.