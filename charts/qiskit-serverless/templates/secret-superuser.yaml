{{- if eq .Values.platform "kind" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.gateway.secrets.superuser.name }}
stringData:
  {{ .Values.gateway.secrets.superuser.key.name }}: {{ .Values.gateway.secrets.superuser.value.name }}
  {{ .Values.gateway.secrets.superuser.key.password }}: {{ .Values.gateway.secrets.superuser.value.password }}
  {{ .Values.gateway.secrets.superuser.key.email }}: {{ .Values.gateway.secrets.superuser.value.email }}
{{- end }}
